{% extends "layout.html" %}

{% block content %}

<h2>Latest Posts</h2>

{% if posts %}

    <ul>
    {% for post in posts %}
        <li>
            <a href="/posts/{{ post.id }}">
    <strong>{{ post.title }}</strong>
</a>
        </li>
    {% endfor %}
    </ul>

{% else %}

    <p>No blog posts yet.</p>

{% endif %}

{% endblock %}
